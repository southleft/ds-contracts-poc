            - paragraph [ref=f3e119]:
              - text: "The one rule that makes the whole thing work:"
              - strong [ref=f3e120]: surfaces never sync side-to-side.
              - text: A designer's change and an engineer's change both take the same path — into the contract as a reviewable proposal, then out to the other surface by regeneration. One arbiter, one diff, no arbitration meetings.
