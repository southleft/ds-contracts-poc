          - article [ref=f3e61]:
            - paragraph [ref=f3e62]: New here? This page is the five-minute orientation. Everything else in the docs assumes you've read it.
            - heading "What is this?" [level=2] [ref=f3e63]
            - paragraph [ref=f3e64]:
              - text: A
              - strong [ref=f3e65]: design system where the source of truth is a contract, not a surface.
            - paragraph [ref=f3e66]:
              - text: Every component in the catalog is defined once, in a small JSON file called a
              - strong [ref=f3e67]: contract
              - text: ". The contract records the things design and engineering must agree on: the component's props and their legal values, its anatomy (the parts it's made of), which design tokens style each part, what its slots accept, and its accessibility semantics. From that one file, generators produce"
              - strong [ref=f3e68]: both
              - text: "renderers:"
            - list [ref=f3e69]:
              - listitem [ref=f3e70]:
                - text: the
                - strong [ref=f3e71]: code library
                - text: — working, accessible React components with stories and a publishable package, and
              - listitem [ref=f3e72]:
                - text: the
                - strong [ref=f3e73]: canvas library
                - text: — native design-tool components with variants, properties, and mode-aware variables.
            - paragraph [ref=f3e74]:
              - text: Neither surface is hand-maintained. Neither is a copy of the other. Both are compiled from the contract, and a
              - strong [ref=f3e75]: three-way differ
              - text: continuously proves they still match it.
            - code [ref=f3e77]: contracts/button.contract.json ← the source of truth ├── src/components/Button/ ← generated React + CSS + stories └── canvas library "Button" set ← generated variants + bound variables
            - heading "Why do we have this?" [level=2] [ref=f3e78]
            - paragraph [ref=f3e79]: Because the alternative always ends the same way. If code is canonical, the design file becomes an aging picture of the product. If the design library is canonical, the code becomes an approximation of the pictures. Either way, one side is a hand-maintained copy — and copies drift, and drift erodes trust, and eroded trust is why design reviews turn into arguments about which surface is "right."
            - paragraph [ref=f3e80]:
              - text: "The contract dissolves the argument by making it a category error:"
              - strong [ref=f3e81]: both surfaces are renderers.
              - text: Asking whether the design file or the code is the truth becomes like asking whether the PDF or the print-out is the original document. The original is the contract, it's versioned in Git, and every change to it is a reviewable diff.
            - paragraph [ref=f3e82]:
              - text: "There's a second reason, and it's becoming the bigger one:"
              - strong [ref=f3e83]: AI generation.
              - text: When an agent builds UI, an ungoverned agent invents props, hard-codes colors, and restyles components — measured here at 69/100 adherence with 91 violations. The same model constrained by the compiled contract catalog scored
              - strong [ref=f3e84]: 100/100 with zero violations
              - text: ", and when it hit a genuine gap in the system it reported the gap instead of faking around it. The contract isn't just how design and code stay aligned — it's how"
              - emphasis [ref=f3e85]: generation
              - text: "stays honest. (Full evidence:"
              - link "Validation" [ref=f3e86] [cursor=pointer]:
                - /url: "#/docs/07-validation"
              - text: .)
            - heading "How the two sides stay connected" [level=2] [ref=f3e87]
            - 'img "Workflow diagram: the contract sits between the design surface and the code surface. Generation flows outward from the contract to both surfaces; changes on either surface flow back into the contract as promotions, and the contract regenerates the other side. A differ continuously compares all three." [ref=f3e88]':
