            - paragraph [ref=f3e151]: Same file, two faithful renderings, and the differ can mechanically prove both — that's the whole idea.
            - paragraph [ref=f3e152]:
              - strong [ref=f3e153]: "And in both directions:"
              - text: this repo has run the loop both ways with receipts. An engineer added a
              - code [ref=f3e154]: loading
              - text: prop in code → the differ flagged code
              - emphasis [ref=f3e155]: ahead
              - text: → the prop was promoted into the contract (v1.1.0) → the canvas set gained a Loading property on regeneration. A designer changed a surface color on the canvas → the differ flagged the token
              - emphasis [ref=f3e156]: mismatched
              - text: "with a proposed patch → the patch was promoted into the tokens → the CSS rebuilt. Neither change touched the other surface directly. (Blow-by-blow:"
              - link "The Parity Loop" [ref=f3e157] [cursor=pointer]:
                - /url: "#/docs/06-parity-loop"
              - text: .)
            - heading "How do I use it?" [level=2] [ref=f3e158]
            - paragraph [ref=f3e159]:
              - strong [ref=f3e160]: "If you're a designer:"
              - text: work in the canvas library like you always do — the components there are real, with variants, properties, and swappable slots. When something needs to change (a color that fails in context, a missing variant), change it. The differ will surface your change as a proposal; once accepted, code follows automatically. You never file a ticket asking engineering to "match the file."
            - paragraph [ref=f3e161]:
              - strong [ref=f3e162]: "If you're an engineer:"
              - code [ref=f3e163]: "import { Banner } from"
              - text: the package and build. The props are the contract's props — nothing more, nothing less. When the product needs a prop that doesn't exist, add it in code; the differ flags it, the promotion bumps the contract, and the design library gains it without anyone redrawing.
            - paragraph [ref=f3e164]:
              - strong [ref=f3e165]: "If you're an AI agent (or pointing one at this):"
              - text: generate against
              - code [ref=f3e166]: catalog/catalog.json
              - text: — the compiled constraint containing every component API, every token, and the governance rules. The deterministic judge (
              - code [ref=f3e167]: npm run judge -- <file.tsx>
              - text: ) scores any screen against it. Off-catalog props, raw hex values, and style overrides are mechanical failures, not style feedback.
            - paragraph [ref=f3e168]:
              - strong [ref=f3e169]: "If you maintain the system:"
              - text: the contract files in
              - code [ref=f3e170]: contracts/
              - text: are your entire authoring surface. Edit one (or use the Hub's
              - emphasis [ref=f3e171]: Evolve the contract
              - text: panel), and everything downstream — React, stories, CSS, canvas sets, catalog, docs data — regenerates.
            - heading "How to get started" [level=2] [ref=f3e172]
            - code [ref=f3e174]: "git clone <repo> && cd ds-contracts-poc npm install npm run build # tokens → schema → generated components (validated) npm run dashboard # the Contract Hub, http://localhost:5180 npm run storybook # the generated component library"
            - paragraph [ref=f3e175]: "Then prove the loop to yourself in about two minutes:"
            - list [ref=f3e176]:
              - listitem [ref=f3e177]:
                - code [ref=f3e178]: npm run parity
                - text: — see it report
                - strong [ref=f3e179]: clean
                - text: ": code, canvas, and tokens all match the contracts."
              - listitem [ref=f3e180]:
                - text: Open a contract in
                - code [ref=f3e181]: contracts/
                - text: and change something small — add an enum value, tweak a token binding.
              - listitem [ref=f3e182]:
                - code [ref=f3e183]: npm run build && npm run parity
                - text: — the differ now reports the canvas
                - strong [ref=f3e184]: behind
                - text: ", naming exactly what's missing and how to fix it. That honest red state"
                - emphasis [ref=f3e185]: is
                - text: "the product: nothing pretends to be in sync when it isn't."
              - listitem [ref=f3e186]: Revert, or carry the change through — regenerate, sync the canvas, and watch it go green again.
              - listitem [ref=f3e187]:
                - code [ref=f3e188]: npm run eval
                - text: — 26 deterministic checks that the machinery itself (detection, refusal, convergence, byte-identical regeneration) still holds.
