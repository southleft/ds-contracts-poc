          - article [ref=e57]:
            - paragraph [ref=e58]: Every organization that takes design systems seriously eventually splits into two camps, usually without noticing.
            - paragraph [ref=e59]:
              - text: Some organizations come in from the
              - strong [ref=e60]: code side
              - text: . Their design system is an npm package. The components are real, tested, and shipped — and the design files are an approximation of them, redrawn by hand, aging from the moment they're published. Designers work against a picture of the product, not the product. When an engineer adds a prop or changes a default, no one redraws anything, and the picture quietly becomes fiction.
            - paragraph [ref=e61]:
              - text: Other organizations come in from the
              - strong [ref=e62]: design side
              - text: . Their design system is a canvas library. The components are beautifully specified, every variant enumerated — and the code is an approximation of
              - emphasis [ref=e63]: them
              - text: ", rebuilt by hand, drifting from the moment it's merged. Engineers work against screenshots and redlines. When a designer restructures a component, no one refactors anything, and the library becomes a wish list."
            - paragraph [ref=e64]:
              - text: Both camps are answering the same question —
              - emphasis [ref=e65]: where does the truth live?
              - text: "— and both answers fail the same way: whichever side is declared canonical, the other side becomes a hand-maintained copy. Copies drift. Drift erodes trust. Eroded trust is why design reviews devolve into archaeology (\"is the file right, or is prod right?\") and why every design system team ends up with a human whose actual job is reconciliation."
            - heading "The position this proof of concept takes" [level=2] [ref=e66]
            - paragraph [ref=e67]:
              - strong [ref=e68]: The source of truth is neither surface.
              - text: It's a machine-readable
              - strong [ref=e69]: contract
              - text: that sits between them.
            - paragraph [ref=e70]:
              - text: "A contract is a small, versioned JSON document that captures everything both sides must agree on: the component's API (props, types, enum vocabularies, defaults, what's required), its anatomy (the parts it's made of and how they nest), its bindings to design tokens (never raw values), its slots (what it accepts, and how strictly), and its semantics (element, ARIA role). The canvas library and the code library are both"
              - strong [ref=e71]: renderers
              - text: of that contract — generated from it on the first pass, validated against it forever after.
            - paragraph [ref=e72]:
              - text: That second half is the important half. Generation is a party trick; lots of tools generate code or draw components once. The contract model is
              - strong [ref=e73]: generative first, diagnostic forever
              - text: ": after the first pass, a three-way differ continuously compares the contract, the code, and the canvas, and classifies every difference as"
              - emphasis [ref=e74]: ahead
              - text: (a surface has something the contract doesn't),
              - emphasis [ref=e75]: behind
              - text: (a surface is missing something the contract has), or
              - emphasis [ref=e76]: mismatched
              - text: . Nothing syncs side-to-side. Ever.
            - heading "Fluidity, not enforcement" [level=2] [ref=e77]
            - paragraph [ref=e78]:
              - text: The bridge would be worthless if it only policed. Real teams evolve their systems from both ends — an engineer adds a
              - code [ref=e79]: loading
              - text: prop because the product needed it; a designer adjusts a surface color because the old one failed in context. Both of those are
              - emphasis [ref=e80]: good
              - text: changes that started on the "wrong" side.
            - paragraph [ref=e81]:
              - text: So the loop is built around
              - strong [ref=e82]: promotion
              - text: ": when a surface runs ahead of the contract, that difference becomes a reviewable proposal"
              - emphasis [ref=e83]: to the contract
              - text: . Accept it, and the contract version bumps and regenerates the other side — the designer's color change flows to code, the engineer's prop flows to the canvas, and both surfaces stay honest without either being demoted. Reject it, and the surface is flagged as drift to be reverted. Either way there is exactly one arbiter, and it's a diffable, reviewable, version-controlled file — the same governance model that made Git work for code and made the DTCG token format work for design tokens. This proof of concept runs that playbook one level up, at the component-API layer.
            - heading "What \"validated\" means here" [level=2] [ref=e84]
            - paragraph [ref=e85]: "This isn't an architecture diagram — the loop in these docs has been run end to end, in both directions, with the receipts committed:"
            - list [ref=e86]:
              - listitem [ref=e87]:
                - strong [ref=e88]: One contract, two surfaces
                - text: ": every component in the catalog is generated into working, accessible React (with stories and a publishable package) and into a native canvas library (variants, mode-aware variables, slot properties) from the same JSON — including composition three levels deep and enterprise patterns mirrored from a shipping industry component library."
              - listitem [ref=e89]:
                - strong [ref=e90]: Deterministic honesty
                - text: ": a mutation-tested eval suite proves the differ detects every class of drift it claims to, refuses illegal contracts, converges after promotion, and regenerates byte-identically."
              - listitem [ref=e91]:
                - strong [ref=e92]: Governed generation measurably wins
                - text: ": the same AI model building the same screens scored"
                - strong [ref=e93]: 100/100 adherence with zero violations
                - text: when constrained by the contract catalog, versus
                - strong [ref=e94]: 69/100 with 91 violations
                - text: (invented APIs, hard-coded values, style overrides) without it. And when the constrained agent hit a real gap in the system, it
                - emphasis [ref=e95]: reported the gap instead of faking around it
                - text: — the gap became a contract proposal, the proposal became a version bump, and the score went back to 100. That's the loop working under pressure.
            - paragraph [ref=e96]:
              - text: "The rest of these docs walk the same path in detail: the contract spec, the token pipeline, generation into each surface, the parity loop, the validation evidence, and the road toward a contributable spec. Start with"
              - link "Architecture & the Contract Model" [ref=e97] [cursor=pointer]:
                - /url: "#/docs/01-architecture"
              - text: .
