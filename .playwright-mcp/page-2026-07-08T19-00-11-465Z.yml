      - paragraph [ref=f37e14]: "A component contract is a machine-readable agreement about a component’s API, anatomy, and token bindings — one source of truth that both design tools and code generate from. This playground runs the actual engine behind a 51-component library: import a design or paste code, watch a contract be proposed, edit it under schema governance, and generate React, static HTML, and a Figma sync script from the same document. Everything runs client-side; nothing you paste leaves your browser."
