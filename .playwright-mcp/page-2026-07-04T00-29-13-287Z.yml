          - article [ref=e57]:
            - heading "The problem this PoC exists to settle" [level=2] [ref=e58]
            - paragraph [ref=e59]: "Every design system team eventually argues about where the canonical source of truth lives: the Figma library or the code library. Both answers are wrong in the same way — each leaves the other side as a hand-maintained copy that drifts. Developers outnumber designers, so code accumulates decisions design never signed off on; design files freeze into snapshots of intent that stop being true."
            - paragraph [ref=e60]:
              - text: "The position this PoC takes:"
              - strong [ref=e61]: the source of truth is neither surface. It's a machine-readable contract that sits between them.
              - text: The Figma library and the React library are both
              - emphasis [ref=e62]: renderers
              - text: of the contract — generated from it on first pass, validated against it forever after.
            - paragraph [ref=e63]:
              - text: "This isn't a novel claim (see the spring 2026 essays from izaias, TJ Pitre, and Cristian Morales Achiardi converging on it), but nobody has shipped it: every existing artifact makes one side primary. Custom Elements Manifest, Storybook manifests, and story.to.design are code-first. Supernova and the EightShapes Specs plugin are Figma-first. Subframe and Knapsack own both ends and are proprietary. The token layer is the exception — the DTCG format proved a neutral, Git-versioned, tool-agnostic artifact can govern both sides."
              - strong [ref=e64]: This PoC runs the DTCG playbook one level up, at the component-API layer.
            - 'heading "The model: generative first, diagnostic forever after" [level=2] [ref=e65]'
            - paragraph [ref=e66]: "Two prior architectures compete in the literature:"
            - list [ref=e67]:
              - listitem [ref=e68]:
                - strong [ref=e69]: Compile-forward
                - text: "(izaias): the contract is generative; everything downstream is regenerated; Figma is demoted to a renderer. Clean, but has no answer for when code legitimately gets ahead of design."
              - listitem [ref=e70]:
                - strong [ref=e71]: Reconcile-bidirectionally
                - text: "(the diagnostic layer): both artifacts stay live; tooling diffs and repairs. Honest about reality, but under-specified about"
                - emphasis [ref=e72]: arbitration
                - text: — when design and code disagree, who wins, by what rule?
            - paragraph [ref=e73]: "This PoC is a deliberate hybrid:"
            - list [ref=e74]:
              - listitem [ref=e75]:
                - strong [ref=e76]: First pass is generative.
                - text: "The contract compiles both sides. Code side: React components, CSS Modules, CSF3 stories ("
                - code [ref=e77]: npm run build
                - text: ", working today). Figma side: variables with modes/aliases and component sets with variant properties (phase 2, via the Figma Console MCP)."
              - listitem [ref=e78]:
                - strong [ref=e79]: Steady state is diagnostic.
                - text: Both surfaces are live and humans edit them. Parity tooling reads each side back into contract-shaped data and diffs both against the contract (phase 3).
              - listitem [ref=e80]:
                - strong [ref=e81]: "The arbitration rule:"
                - text: neither side ever syncs directly to the other.
                - strong [ref=e82]:
                  - text: A change on either side is a
                  - emphasis [ref=e83]: proposal
                  - text: to the contract.
                - text: Drift detection produces a contract diff; a human accepts it as a contract PR; merging regenerates the
                - emphasis [ref=e84]: other
                - text: side.
            - code [ref=e86]: code change ──extract──▶ contract diff ──PR + review──▶ contract ──generate──▶ Figma Figma change ──extract──▶ contract diff ──PR + review──▶ contract ──generate──▶ code
            - paragraph [ref=e87]:
              - text: The contract wins not because it's sacred but because
              - strong [ref=e88]: it is the only place a change becomes canonical.
              - text: "A developer adding a prop and a designer adding a variant go through the same door: a reviewable, versionable, diffable change to a JSON file in Git. That's what \"keep both sides honest\" looks like as a mechanism instead of a slogan."
            - heading "Why the style mapping lives in the contract" [level=3] [ref=e89]
            - paragraph [ref=e90]:
              - text: "A subtle failure mode in contract-first proposals: if the contract declares"
              - code [ref=e91]: "variant: primary | secondary"
              - text: but a handwritten "resolver" maps those values to styles, drift hasn't been eliminated — it's moved into the resolver. So in this PoC, the contract's
              - strong [ref=e92]: anatomy
              - text: section binds each named part directly to design token references (
              - code [ref=e93]: "\"background-color\": \"{color.action.{variant}.background}\""
              - text: ), and the CSS Module is
              - emphasis [ref=e94]: generated
              - text: from those bindings. There is no handwritten style layer to drift. The generator fails the build if a binding references a token that doesn't exist — contract and tokens cannot silently disagree.
