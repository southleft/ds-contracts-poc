<!--
  ModalComposite — static HTML+CSS emitted from contract ds.modal-composite v1.0.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent; an empty slot renders its wrapper empty (absent content
  is absent — named in an inline comment, never painted as placeholder text). Booleans render per showcase item.
-->
<section class="showcase showcase--modal-composite">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <div class="modal-composite__dialog" role="dialog" aria-modal="true">
      <div class="modal-composite__header">
        <h2 class="modal-composite__title">Order details</h2>
        <button class="modal-composite__close" type="button" aria-label="Close"><span class="modal-composite__close-glyph" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="5" y1="5" x2="15" y2="15" stroke-linecap="round"/><line x1="15" y1="5" x2="5" y2="15" stroke-linecap="round"/></svg></span></button>
      </div>
      <p class="modal-composite__body">Body copy inside a sectioned modal.</p>
      <div class="modal-composite__footer">
        <button class="modal-composite__cancel" type="button">
          <span class="modal-composite__cancel-label">Cancel</span>
        </button>
        <button class="modal-composite__save" type="button">
          <span class="modal-composite__save-label">Save</span>
        </button>
      </div>
    </div>
    <div class="modal-composite__backdrop"></div>
  </div>
</section>
