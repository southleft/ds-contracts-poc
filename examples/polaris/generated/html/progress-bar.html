<!--
  ProgressBar — static HTML+CSS emitted from contract polaris.progress-bar v0.3.2 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent; an empty slot renders its wrapper empty (absent content
  is absent — named in an inline comment, never painted as placeholder text). Booleans render per showcase item.
-->
<section class="showcase showcase--progress-bar">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <div class="progress-bar progress-bar--size-medium progress-bar--tone-highlight">
      <progress class="progress-bar__progress"></progress>
      <div class="progress-bar__indicator">
        <span class="progress-bar__label">25%</span>
      </div>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=small</p>
    <div class="progress-bar progress-bar--size-small progress-bar--tone-highlight">
      <progress class="progress-bar__progress"></progress>
      <div class="progress-bar__indicator">
        <span class="progress-bar__label">25%</span>
      </div>
    </div>
  </div>
  <div class="showcase__item">

  <div class="showcase__item">
