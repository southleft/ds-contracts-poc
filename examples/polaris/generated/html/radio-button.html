<!--
  RadioButton — static HTML+CSS emitted from contract polaris.radio-button v0.3.1 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent; an empty slot renders its wrapper empty (absent content
  is absent — named in an inline comment, never painted as placeholder text). Booleans render per showcase item.
-->
<section class="showcase showcase--radio-button">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <span class="radio-button radio-button--checked-unchecked">
      <span class="radio-button__choice__control">
        <span class="radio-button__radiobutton">
          <input class="radio-button__input" type="radio" name="" value="">
          <div class="radio-button__backdrop"></div>
          <div class="radio-button__backdrop-before"></div>
        </span>
      </span>
      <span class="radio-button__choice__label">
        <span class="radio-button__label">Accounts are disabled</span>
      </span>
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">checked=checked</p>
    <span class="radio-button radio-button--checked-checked">
      <span class="radio-button__choice__control">
        <span class="radio-button__radiobutton">
          <input class="radio-button__input" type="radio" name="" value="">
          <div class="radio-button__backdrop"></div>
          <div class="radio-button__backdrop-before"></div>
        </span>
      </span>
      <span class="radio-button__choice__label">
        <span class="radio-button__label">Accounts are disabled</span>
      </span>
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">labelHidden=true</p>
    <span class="radio-button radio-button--checked-unchecked" data-label-hidden="true">
      <span class="radio-button__choice__control">
        <span class="radio-button__radiobutton">
          <input class="radio-button__input" type="radio" name="" value="">
          <div class="radio-button__backdrop"></div>
          <div class="radio-button__backdrop-before"></div>
        </span>
      </span>
      <span class="radio-button__choice__label">
        <span class="radio-button__label">Accounts are disabled</span>
      </span>
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">disabled=true</p>
    <span class="radio-button radio-button--checked-unchecked" data-disabled="true">
      <span class="radio-button__choice__control">
        <span class="radio-button__radiobutton">
          <input class="radio-button__input" type="radio" name="" value="">
          <div class="radio-button__backdrop"></div>
          <div class="radio-button__backdrop-before"></div>
        </span>
      </span>
      <span class="radio-button__choice__label">
        <span class="radio-button__label">Accounts are disabled</span>
      </span>
    </span>
  </div>
</section>
