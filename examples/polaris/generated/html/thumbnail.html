<!--
  Thumbnail — static HTML+CSS emitted from contract polaris.thumbnail v0.1.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent; an empty slot renders its wrapper empty (absent content
  is absent — named in an inline comment, never painted as placeholder text). Booleans render per showcase item.
-->
<section class="showcase showcase--thumbnail">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <span class="thumbnail thumbnail--size-medium">
      Thumbnail
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=extraSmall</p>
    <span class="thumbnail thumbnail--size-extraSmall">
      Thumbnail
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=small</p>
    <span class="thumbnail thumbnail--size-small">
      Thumbnail
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=large</p>
    <span class="thumbnail thumbnail--size-large">
      Thumbnail
    </span>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">transparent=true</p>
    <span class="thumbnail thumbnail--size-medium" data-transparent="true">
      Thumbnail
    </span>
  </div>
</section>
