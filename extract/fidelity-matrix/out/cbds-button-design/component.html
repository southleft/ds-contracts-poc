<!--
  ButtonBrandPrimary — static HTML+CSS emitted from contract ds.button-brand-primary v0.1.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent, else a named placeholder. Booleans render per showcase item.
-->
<section class="showcase showcase--button-brand-primary">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-default">
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=medium</p>
    <div class="button-brand-primary button-brand-primary--size-medium button-brand-primary--state-default">
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=small</p>
    <div class="button-brand-primary button-brand-primary--size-small button-brand-primary--state-default">
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">state=hover</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-hover">
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">state=focus</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-focus">
      <span class="button-brand-primary__Button">Button</span>
      <div class="button-brand-primary__focusRing"></div>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">state=pressed</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-pressed">
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">state=disabled</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-disabled">
      <span class="button-brand-primary__Button">Button</span>
      <span class="button-brand-primary__Tooltip">This action is currently unavailable</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">iconLeft=true</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-default" data-icon-left="true">
      <span class="icon icon--size-large">
        Icon
      </span>
      <span class="button-brand-primary__Button">Button</span>
    </div>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">iconRight=true</p>
    <div class="button-brand-primary button-brand-primary--size-large button-brand-primary--state-default" data-icon-right="true">
      <span class="button-brand-primary__Button">Button</span>
      <span class="icon icon--size-large">
        Icon
      </span>
    </div>
  </div>
</section>
