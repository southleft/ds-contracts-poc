<!--
  ButtonBrandPrimary — static HTML+CSS emitted from contract ds.button-brand-primary v0.1.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent; an empty slot renders its wrapper empty (absent content
  is absent — named in an inline comment, never painted as placeholder text). Booleans render per showcase item.
-->
<section class="showcase showcase--button-brand-primary">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <button class="button-brand-primary button-brand-primary--size-large">
      <span class="button-brand-primary__Button">Button</span>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=medium</p>
    <button class="button-brand-primary button-brand-primary--size-medium">
      <span class="button-brand-primary__Button">Button</span>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">size=small</p>
    <button class="button-brand-primary button-brand-primary--size-small">
      <span class="button-brand-primary__Button">Button</span>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">iconLeft=true</p>
    <button class="button-brand-primary button-brand-primary--size-large" data-icon-left="true">
      <span class="icon icon--size-large">

      </span>
      <span class="button-brand-primary__Button">Button</span>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">iconRight=true</p>
    <button class="button-brand-primary button-brand-primary--size-large" data-icon-right="true">
      <span class="button-brand-primary__Button">Button</span>
      <span class="icon icon--size-large">

      </span>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">disabled=true</p>
    <button class="button-brand-primary button-brand-primary--size-large" disabled>
      <span class="button-brand-primary__Button">Button</span>
    </button>
  </div>
</section>
