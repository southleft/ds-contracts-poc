<!--
  Button — static HTML+CSS emitted from contract ds.button v0.1.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent, else a named placeholder. Booleans render per showcase item.
-->
<section class="showcase showcase--button">
  <div class="showcase__item">
    <p class="showcase__label">default</p>
    <button class="button button--variant-primary" data-has-start-icon="true" data-has-end-icon="true">
      <div class="button__startIcon">
        <span class="button__slot-placeholder">[startIcon slot]</span>
      </div>
      <span class="button__Label">Label</span>
      <div class="button__endIcon">
        <span class="button__slot-placeholder">[endIcon slot]</span>
      </div>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">variant=knockout</p>
    <button class="button button--variant-knockout" data-has-start-icon="true" data-has-end-icon="true">

      <span class="button__Label">Label</span>
      <div class="button__endIcon">
        <span class="button__slot-placeholder">[endIcon slot]</span>
      </div>
    </button>
  </div>
  <div class="showcase__item">
    <p class="showcase__label">variant=secondary</p>
    <button class="button button--variant-secondary" data-has-start-icon="true" data-has-end-icon="true">

      <div class="button__endIcon">
        <span class="button__slot-placeholder">[endIcon slot]</span>

  </div>
  <div class="showcase__item">
    <p class="showcase__label">variant=bare</p>

      <span class="button__Label">Label</span>
      <div class="button__endIcon">
        <span class="button__slot-placeholder">[endIcon slot]</span>

  </div>
  <div class="showcase__item">

  </div>
</section>
