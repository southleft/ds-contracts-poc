<!--
  Button — static HTML+CSS emitted from contract ds.button v0.1.0 by core/emit-html.ts.
  Token values arrive via CSS custom properties (the same custom-property names the CSS Modules
  bind) — include the token stylesheet (src/styles/tokens.css) on the page or nothing resolves.
  Fidelity: no events, no interactivity beyond CSS states (:hover/:focus-visible/:disabled).
  Slots render their declared defaultContent, else a named placeholder. Booleans render per showcase item.
-->
<section class="showcase showcase--button">

    <p class="showcase__label">default</p>
    <button class="button button--variant-primary button--size-medium">
      <span class="button__iconLeft">
        <span class="button__slot-placeholder">[iconLeft slot]</span>
      </span>
      <div class="button__children">
        <span class="button__slot-placeholder">[children slot]</span>
      </div>
      <span class="button__iconRight">
        <span class="button__slot-placeholder">[iconRight slot]</span>
      </span>
    </button>
  </div>
